# Required repository secrets:
#   KUBE_CONFIG      - base64-encoded kubeconfig with access to the murgdur namespace
#                       (only needed if NOT using ArgoCD auto-sync; ArgoCD will
#                       pick up new image tags via the manifests pushed by this
#                       workflow's `update-manifests` step instead)
#
# GHCR auth uses the built-in GITHUB_TOKEN — no extra secret needed, as long as
# the repo's package visibility/permissions allow it (Settings > Actions >
# General > Workflow permissions: "Read and write permissions").
name: deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/murgdur-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/murgdur-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm run build
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.KUBE_CONFIG != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Run database migrations
        run: |
          kubectl -n murgdur delete job backend-migrate --ignore-not-found
          sed "s|${{ env.IMAGE_BACKEND }}:latest|${{ env.IMAGE_BACKEND }}:${{ github.sha }}|" infrastructure/k8s/backend/migration-job.yaml | \
            kubectl apply -f -
          kubectl -n murgdur wait --for=condition=complete --timeout=180s job/backend-migrate

      - name: Roll out new images
        run: |
          kubectl -n murgdur set image deployment/backend backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          kubectl -n murgdur set image deployment/frontend frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          kubectl -n murgdur rollout status deployment/backend
          kubectl -n murgdur rollout status deployment/frontend
