# Replace `repoURL` with your actual git remote (e.g. the GitHub repo this
# project lives in), then on a cluster with ArgoCD installed:
#   kubectl apply -f infrastructure/argocd/application.yaml
# ArgoCD will then continuously sync infrastructure/k8s/ into the `murgdur`
# namespace, including running the backend-migrate PreSync hook before each
# rollout.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: murgdur
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lohit-Sathesh/MurgdurV2.git
    targetRevision: main
    path: infrastructure/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: murgdur
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
