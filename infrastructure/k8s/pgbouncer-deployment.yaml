# PgBouncer connection pooler sitting in front of the managed Postgres instance.
# Requires these additional keys in murgdur-secrets (split out from DATABASE_URL):
#   DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
# The backend's DATABASE_URL should then point at pgbouncer:5432 instead of the
# Postgres host directly, with `?pgbouncer=true` appended for Prisma.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: murgdur
spec:
  replicas: 2
  selector:
    matchLabels: { app: pgbouncer }
  template:
    metadata:
      labels: { app: pgbouncer }
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: murgdur-secrets, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: murgdur-secrets, key: DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: murgdur-secrets, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: murgdur-secrets, key: DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: murgdur-secrets, key: DB_NAME } }
            - name: POOL_MODE
              value: transaction
            - name: MAX_CLIENT_CONN
              value: "200"
            - name: DEFAULT_POOL_SIZE
              value: "20"
            - name: AUTH_TYPE
              value: scram-sha-256
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: murgdur
spec:
  selector: { app: pgbouncer }
  ports:
    - port: 5432
      targetPort: 5432
