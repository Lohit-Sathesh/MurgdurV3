apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: murgdur
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/murgdur-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: murgdur-config
            - secretRef:
                name: murgdur-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
