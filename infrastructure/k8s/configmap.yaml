apiVersion: v1
kind: ConfigMap
metadata:
  name: murgdur-config
  namespace: murgdur
data:
  # ── Backend ──────────────────────────────────────────────
  NODE_ENV: "production"
  PORT: "3001"
  FRONTEND_URL: "https://murgdur.example"
  MEILISEARCH_HOST: "http://meilisearch:7700"
  CLOUDFLARE_R2_ENDPOINT: "https://<account-id>.r2.cloudflarestorage.com"
  R2_BUCKET_NAME: "murgdur-media"
  R2_PUBLIC_CDN_URL: "https://media.murgdur.example"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"

  # ── Frontend ─────────────────────────────────────────────
  NEXT_PUBLIC_API_URL: "https://murgdur.example/api"
  INTERNAL_API_URL: "http://backend:80"
  NEXTAUTH_URL: "https://murgdur.example"
  NEXT_PUBLIC_MEILISEARCH_HOST: "https://search.murgdur.example"
  NEXT_PUBLIC_CDN_URL: "https://media.murgdur.example"
