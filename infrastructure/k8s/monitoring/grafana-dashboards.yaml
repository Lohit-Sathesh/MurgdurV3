apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: murgdur
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: murgdur
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: murgdur
        orgId: 1
        folder: Murgdur
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: murgdur
data:
  murgdur-overview.json: |
    {
      "title": "Murgdur Overview",
      "uid": "murgdur-overview",
      "schemaVersion": 39,
      "panels": [
        {
          "title": "Backend CPU (s/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "rate(process_cpu_user_seconds_total{job=\"murgdur-backend\"}[5m])" }
          ]
        },
        {
          "title": "Backend Memory (resident bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"murgdur-backend\"}" }
          ]
        },
        {
          "title": "Event Loop Lag (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "nodejs_eventloop_lag_seconds{job=\"murgdur-backend\"}" }
          ]
        },
        {
          "title": "Active Handles",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "nodejs_active_handles_total{job=\"murgdur-backend\"}" }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: murgdur
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: murgdur
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: murgdur-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: murgdur
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
