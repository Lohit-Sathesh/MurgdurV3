apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: murgdur
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: murgdur-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['backend:80']
      - job_name: murgdur-frontend
        metrics_path: /metrics
        static_configs:
          - targets: ['frontend:80']
      - job_name: redis
        static_configs:
          - targets: ['redis-exporter:9121']
      - job_name: meilisearch
        static_configs:
          - targets: ['meilisearch:7700']
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: murgdur
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: murgdur
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
          ports:
            - containerPort: 9090
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 1Gi }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: murgdur
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
