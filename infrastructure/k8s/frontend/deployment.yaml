apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: murgdur
spec:
  replicas: 3
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/murgdur-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: murgdur-config
            - secretRef:
                name: murgdur-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
