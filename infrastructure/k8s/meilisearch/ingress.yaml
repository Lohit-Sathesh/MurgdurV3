# Exposes Meilisearch publicly so the Next.js client (browser) can perform
# search queries directly using NEXT_PUBLIC_MEILISEARCH_SEARCH_KEY (a
# search-only API key — never expose MEILISEARCH_API_KEY/master key here).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meilisearch-ingress
  namespace: murgdur
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - search.murgdur.example
      secretName: meilisearch-tls
  rules:
    - host: search.murgdur.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meilisearch
                port:
                  number: 7700
